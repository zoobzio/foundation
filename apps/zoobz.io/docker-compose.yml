services:
  postgres:
    image: postgres:17-alpine
    container_name: foundation-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foundation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foundation}
      POSTGRES_DB: ${POSTGRES_DB:-content}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foundation} -d ${POSTGRES_DB:-content}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
